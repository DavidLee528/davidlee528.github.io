<!DOCTYPE html>
<html>
<head>
  <title>Random Word Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #game-container {
      width: 80%;
      margin: 40px auto;
      text-align: center;
    }
    #word-display {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    #button-container {
      margin-top: 20px;
    }
    #next-button {
      background-color: #4CAF50;
      color: #ffffff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #next-button:hover {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <h3>Welcome to DKU summer school! - GAME 5</h3>

  <div id="game-container">
    <h1>Random Word Game</h1>
    <p id="round-display">Round 1</p>
    <p id="word-display"></p>
    <div id="button-container">
      <button id="next-button">Get Next Word</button>
    </div>
  </div>

  <script>
    let wordGroups = {
      "Animals": ["Lion", "Elephant", "Gorilla", "Kangaroo", "Penguin", "Koala", "Crocodile", "Tiger", "Wolf", "Dolphin", "Snake", "Eagle", "Chicken", "Cow", "Pig"],
      "Food": ["Pizza", "Sushi", "Tacos", "Ice Cream", "Donut", "Apple", "Banana", "Orange", "Watermelon", "Steak", "Fries", "Burger", "Sandwich", "Salad", "Soup"],
      "Objects": ["Phone", "Computer", "Book", "Chair", "Table", "Car", "Bike", "Airplane", "Boat", "House", "Tree", "Flower", "Guitar", "Piano", "Camera"]
    };

    let usedWords = [];
    let roundNum = 1;

    function getRandomWord() {
      while (true) {
        let group = Object.keys(wordGroups)[Math.floor(Math.random() * Object.keys(wordGroups).length)];
        let word = wordGroups[group][Math.floor(Math.random() * wordGroups[group].length)];
        if (!usedWords.includes(word)) {
          usedWords.push(word);
          return word;
        }
      }
    }

    document.getElementById("next-button").addEventListener("click", function() {
      let word = getRandomWord();
      document.getElementById("word-display").innerHTML = `The word is: ${word}`;
      roundNum++;
      document.getElementById("round-display").innerHTML = `Round ${roundNum}`;
      if (roundNum > 10) {
        document.getElementById("next-button").disabled = true;
        document.getElementById("word-display").innerHTML = "All rounds complete!";
      }
    });
  </script>

  Author: Tianhao Li
</body>
</html>
